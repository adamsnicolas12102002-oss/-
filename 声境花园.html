<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌿 声境花园 — 聆听声音，见证生长</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;600;700;900&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  :root {
    --bg: #0f172a; --card: rgba(255,255,255,0.08); --border: rgba(255,255,255,0.15);
    --text: #f8fafc; --sub: rgba(255,255,255,0.6); --accent-grad: linear-gradient(135deg, #FF6B6B, #FF69B4);
  }
  body { font-family:'Noto Sans SC', system-ui, sans-serif; background:var(--bg); color:var(--text); overflow:hidden; height:100vh; }
  
  /* ── 主页 ── */
  #homeScreen {
    position:fixed; inset:0; z-index:300; display:flex; flex-direction:column; align-items:center; justify-content:center;
    background: radial-gradient(ellipse at 50% 0%, #1e293b 0%, #0f172a 70%); transition: opacity .5s, transform .5s;
  }
  #homeScreen.hide { opacity:0; pointer-events:none; transform:scale(1.05); }
  .home-title { font-size:46px; font-weight:900; background:linear-gradient(135deg,#60a5fa,#34d399,#f472b6); -webkit-background-clip:text; -webkit-text-fill-color:transparent; margin-bottom:8px; text-align:center; }
  .home-sub { font-size:15px; color:var(--sub); margin-bottom:36px; letter-spacing:2px; }
  .mode-grid { display:grid; grid-template-columns:1fr 1fr; gap:20px; max-width:680px; width:90%; }
  .mode-card {
    background:var(--card); border:1px solid var(--border); border-radius:18px;
    padding:28px 16px; text-align:center; cursor:pointer; transition:all .3s; backdrop-filter:blur(10px);
  }
  .mode-card:hover { transform:translateY(-5px); border-color:rgba(255,255,255,0.4); box-shadow:0 12px 30px rgba(0,0,0,0.35); }
  .mode-card .icon { font-size:48px; margin-bottom:10px; display:block; }
  .mode-card h2 { font-size:20px; margin-bottom:6px; font-weight:700; }
  .mode-card p { font-size:13px; color:var(--sub); line-height:1.5; }
  .mode-card.loud:hover { box-shadow:0 12px 30px rgba(255,107,107,0.25); }
  .mode-card.quiet:hover { box-shadow:0 12px 30px rgba(52,211,153,0.25); }

  /* ── 游戏画布与UI ── */
  canvas { position:fixed; top:0; left:0; width:100vw; height:100vh; z-index:1; }
  .ui-layer {
    position:fixed; inset:0; z-index:100; pointer-events:none; opacity:0;
    transition: opacity .4s ease; display:flex; flex-direction:column;
  }
  .ui-layer.show { opacity:1; pointer-events:auto; }
  .top-bar {
    display:flex; align-items:center; justify-content:space-between; padding:10px 18px;
    background:linear-gradient(135deg, rgba(15,23,42,0.88), rgba(15,23,42,0.65));
    backdrop-filter:blur(16px); border-bottom:1px solid var(--border);
  }
  .back-btn {
    padding:5px 12px; border-radius:14px; border:1px solid var(--border);
    background:rgba(255,255,255,0.05); color:#fff; font-size:12px; font-weight:600;
    cursor:pointer; transition:all .2s;
  }
  .back-btn:hover { background:rgba(255,255,255,0.15); }
  .mode-title { font-size:15px; font-weight:700; letter-spacing:1px; }

  .panels { position:absolute; left:10px; right:10px; top:54px; bottom:70px; display:flex; justify-content:space-between; pointer-events:none; }
  .panel { display:flex; flex-direction:column; align-items:center; gap:4px; pointer-events:auto; }
  .bar-bg { width:32px; height:220px; background:rgba(255,255,255,0.06); border-radius:12px; overflow:hidden; position:relative; border:1px solid var(--border); }
  .bar-fill { position:absolute; bottom:0; left:0; right:0; border-radius:12px; transition:height .12s ease; height:0%; }
  .bar-fill.vol { background:linear-gradient(to top, #00E676, #FFEB3B, #FF5252); }
  .bar-fill.vol.warning { background:linear-gradient(to top, #FF5252, #D50000) !important; animation:barPulse .6s infinite; }
  @keyframes barPulse { 0%,100% { opacity:1; } 50% { opacity:0.5; } }
  .bar-fill.gr { background:linear-gradient(to top, #7C4DFF, #E040FB, #FF80AB); }
  .bar-lbl { font-size:10px; color:var(--sub); writing-mode:vertical-rl; letter-spacing:2px; font-weight:700; }
  .bar-val { font-size:16px; font-weight:800; color:#fff; text-shadow:0 0 8px rgba(255,255,255,0.5); }
  .lv-badge { padding:3px 12px; background:var(--accent-grad); border-radius:10px; font-size:12px; font-weight:800; color:#fff; }
  .warn-icon { font-size:24px; display:none; animation:warnBounce .8s infinite; }
  .warn-icon.show { display:block; }
  @keyframes warnBounce { 0%,100% { transform:scale(1); } 50% { transform:scale(1.3); } }

  .center-msg {
    position:absolute; top:16%; left:50%; transform:translateX(-50%);
    font-size:20px; font-weight:800; color:#fff; text-shadow:0 3px 12px rgba(0,0,0,0.4);
    text-align:center; background:rgba(0,0,0,0.15); padding:8px 20px; border-radius:18px;
    backdrop-filter:blur(5px); border:1px solid rgba(255,255,255,0.1);
    transition: all .4s; white-space:nowrap; max-width: 90%;
  }
  .control-area {
    position:absolute; bottom:18px; left:50%; transform:translateX(-50%);
    display:flex; align-items:center; gap:10px; pointer-events:auto;
  }
  .mic-btn {
    width:60px; height:60px; border-radius:50%; border:3px solid var(--border);
    background:var(--accent-grad); color:#fff; font-size:22px; cursor:pointer;
    transition:all .3s; display:flex; align-items:center; justify-content:center;
    box-shadow:0 6px 20px rgba(0,0,0,0.3); position:relative;
  }
  .mic-btn.on { animation:pulse 2s infinite; box-shadow:0 8px 24px rgba(255,107,107,0.45); }
  @keyframes pulse { 0%{box-shadow:0 0 0 0 rgba(255,107,107,.5)} 70%{box-shadow:0 0 0 14px rgba(255,107,107,0)} 100%{box-shadow:0 0 0 0 rgba(255,107,107,0)} }
  .status-text { font-size:11px; color:var(--sub); font-weight:600; text-align:center; width:70px; }
  .status-text.on { color:#fff; }
  .enc { position:absolute; top:34%; left:50%; transform:translate(-50%,-50%); font-size:28px; font-weight:900; color:#fff; pointer-events:none; opacity:0; text-shadow:0 4px 14px rgba(0,0,0,0.35); transition:opacity .4s, transform .4s; }
  .enc.show { opacity:1; transform:translate(-50%,-55%); }

  .quiet-line { position:absolute; bottom:0; left:0; right:0; height:2px; background:#34d399; transform:scaleY(0); transition:transform .2s; }
  .quiet-line.show { transform:scaleY(1); }
  .tp-btn { padding:6px 14px; border-radius:16px; border:1px solid var(--border); background:var(--card); color:var(--text); font-size:12px; font-weight:600; cursor:pointer; transition:all .2s; }
.tp-btn:hover { border-color:rgba(255,255,255,0.4); background:rgba(255,255,255,0.12); }
.tp-btn.active { border-color:var(--accent-grad); background:linear-gradient(135deg,#FF6B6B,#FF69B4); color:#fff; }
.timer-bar { position:absolute; top:44px; left:0; right:0; height:4px; background:rgba(255,255,255,0.06); z-index:101; }
.timer-fill { height:100%; background:linear-gradient(90deg,#60A5FA,#34D399); border-radius:0 2px 2px 0; transition:width 1s linear; }
@media(max-width:600px){ .mode-grid{grid-template-columns:1fr; gap:14px;} .home-title{font-size:34px;} .center-msg{font-size:16px;} .bar-bg{height:160px;width:28px;} }
</style>
</head>
<body>

<div id="homeScreen">
  <h1 class="home-title">🌿 声境花园</h1>
  <p class="home-sub">聆听声音的律动，见证生命的生长</p>
  <div class="mode-grid">
    <div class="mode-card loud" onclick="enterMode('loud')">
      <span class="icon">📖</span>
      <h2>书声绽放</h2>
      <p>大声朗读，声浪化作雨露<br>声音越响亮，花开越灿烂</p>
    </div>
    <div class="mode-card quiet" onclick="enterMode('quiet')">
      <span class="icon">🤫</span>
      <h2>静语生花</h2>
      <p>保持安静，时光孕育生机<br>环境越宁静，绿意越蔓延</p>
    </div>
  </div>
  <div style="margin-top:20px;text-align:center;">
    <div style="font-size:13px;color:var(--sub);margin-bottom:6px;">⏱ 选择时长</div>
    <div id="timePicker" style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap;">
      <button class="tp-btn" onclick="setTime(300)">5分钟</button>
      <button class="tp-btn active" onclick="setTime(600)">10分钟</button>
      <button class="tp-btn" onclick="setTime(1200)">20分钟</button>
      <button class="tp-btn" onclick="setTime(1800)">30分钟</button>
      <input type="number" id="customMin" placeholder="自定义(分)" min="1" max="120" style="width:100px;padding:4px 8px;border-radius:10px;border:1px solid var(--border);background:rgba(255,255,255,0.05);color:#fff;font-size:12px;text-align:center;">
    </div>
  </div>
</div>

<canvas id="C"></canvas>

<div id="gameUI" class="ui-layer">
  <div class="top-bar">
    <button class="back-btn" onclick="backToHome()">🏠 返回主页</button>
    <span class="mode-title" id="modeTitle">📖 书声绽放</span>
    <div style="width:60px"></div>
  </div>
  <div class="timer-bar"><div class="timer-fill" id="timerFill" style="width:100%"></div></div>
  <div class="panels">
    <div class="panel">
      <span class="lv-badge" id="lvB">Lv.1</span>
      <div class="bar-val" id="grV">0%</div>
      <div class="bar-bg"><div class="bar-fill gr" id="grF"></div></div>
      <span class="bar-lbl" id="grLbl">生长进度</span>
    </div>
    <div class="panel">
      <span class="bar-lbl" id="volLbl">声音强度</span>
      <div class="bar-val" id="volV">0</div>
      <div class="bar-bg" style="position:relative;">
        <div class="bar-fill vol" id="volF"></div>
        <div class="quiet-line" id="qLine"></div>
      </div>
      <div class="warn-icon" id="warnIcon">⚠️</div>
      <div style="font-size:10px;color:#FF5252;font-weight:600;display:none;" id="warnText">音量过高</div>
    </div>
  </div>
  <div class="center-msg" id="centerMsg">🌱 准备就绪，点击麦克风开始</div>
  <div class="enc" id="enc"></div>
  <div class="control-area">
    <div><div class="status-text" id="stxt">点击开始</div></div>
    <button class="mic-btn" id="micBtn" onclick="toggleMic()">🎤</button>
  </div>
</div>

<script>
const C = document.getElementById('C'), X = C.getContext('2d');
let W, H, groundY, _tbStudent = null;

// Toolbox integration
window.addEventListener('message', function(e) {
  if (!e.data || e.data.source !== 'toolbox2') return;
  if (e.data.type === 'init') {
    if (e.data.data && e.data.data.selectedStudent) _tbStudent = e.data.data.selectedStudent;
  }
  if (e.data.type === 'classUpdate') { /* class data updated */ }
});

function resize() { W=C.width=innerWidth; H=C.height=innerHeight; groundY=H*0.76; }
resize(); addEventListener('resize', ()=>{ resize(); if(mode) initScene(); });

let mode = null, running = false, listening = false, audioCtx, analyser, dataArr, stream;
let vol = 0, sVol = 0, growth = 0, lvl = 1, time = 0, lastT = performance.now();
let timeLimit = 600, timeElapsed = 0, quietViolationTime = 0, hintIdx = 0, hintTimer = 0;
let flowers=[], tree=null, bflies=[], grass=[], clouds=[], particles=[];
const msgs = ["\u{1F31F} 朗读声是花儿的甘露","\u{2728} 坚持就是最好的养分","\u{1F343} 专注让生命静静成长","\u{1F308} 时光会给出最美的答案","\u{1F4AB} 每一次朗读都在浇灌","\u{1F3B5} 安静中孕育着生机"];
const hints = ["\u{1F331} 有声音时，花朵暂停绽放","\u{1F342} 声音过大，花园会开始枯萎","\u{1F92B} 保持安静，生命悄悄萌发","\u{1F338} 安静是最好的养分","\u{1F4E3} 坚持发声才能灌溉花园","\u{1F507} 噪音侵入，花园需要恢复宁静"];

function setTime(secs) {
  document.querySelectorAll('.tp-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  timeLimit = secs;
}
function getCustomTime() {
  const v = parseFloat(document.getElementById('customMin').value);
  if (v > 0 && v <= 120) return v * 60;
  return timeLimit;
}

function enterMode(m) {
  mode = m; growth = 0; lvl = 1; sVol = 0; vol = 0; time = 0; timeElapsed = 0; quietViolationTime = 0; hintIdx = 0; hintTimer = 0; lastT = performance.now();
  baselineVol = 0; baselineSamples = 0; baselineReady = false;
  timeLimit = getCustomTime();
  document.getElementById('endOverlay').style.display = 'none';
  document.getElementById('warnIcon').classList.remove('show');
  document.getElementById('warnText').style.display = 'none';
  document.getElementById('timerFill').style.width = '100%';
  document.getElementById('homeScreen').classList.add('hide');
  document.getElementById('gameUI').classList.add('show');
  const t = document.getElementById('modeTitle');
  const vLbl = document.getElementById('volLbl');
  const gLbl = document.getElementById('grLbl');
  const qLine = document.getElementById('qLine');
  const cm = document.getElementById('centerMsg');
  
  if(m==='loud') {
    t.textContent = '\u{1F4D6} 书声绽放'; vLbl.textContent='声音强度'; gLbl.textContent='生长进度';
    qLine.classList.remove('show'); cm.textContent = '\u{1F331} 小树苗已就位，点击麦克风开始朗读！';
  } else {
    t.textContent = '\u{1F92B} 静语生花'; vLbl.textContent='安静阈值'; gLbl.textContent='宁静积累';
    qLine.classList.add('show'); cm.textContent = '\u{1F33F} 环境已就绪，保持安静等待发芽...';
  }
  
  updateUI(); initScene();
  if(!running) { running=true; requestAnimationFrame(loop); }
}

function backToHome() {
  stopMic(); running=false;
  document.getElementById('homeScreen').classList.remove('hide');
  document.getElementById('gameUI').classList.remove('show');
  X.clearRect(0,0,W,H);
}

async function toggleMic() {
  const b=document.getElementById('micBtn'), s=document.getElementById('stxt');
  if(!listening) {
    try {
      stream = await navigator.mediaDevices.getUserMedia({audio:true});
      audioCtx = new (window.AudioContext||window.webkitAudioContext)();
      analyser = audioCtx.createAnalyser(); analyser.fftSize=512;
      audioCtx.createMediaStreamSource(stream).connect(analyser);
      dataArr = new Uint8Array(analyser.frequencyBinCount);
      listening=true; b.classList.add('on'); s.textContent='正在监听'; s.classList.add('on');
      document.getElementById('centerMsg').textContent = mode==='loud' ? '\u{1F4E3} 大声朗读，让小树喝饱水！' : '\u{1F92B} 保持安静，生命正在悄悄萌发...';
    } catch(e) { alert('请允许麦克风权限'); }
  } else { stopMic(); b.classList.remove('on'); s.textContent='点击开始'; s.classList.remove('on'); }
}
function stopMic() { listening=false; if(stream) stream.getTracks().forEach(t=>t.stop()); if(audioCtx) audioCtx.close(); }

function readVol() {
  if(!listening||!analyser){ vol=0; return; }
  analyser.getByteFrequencyData(dataArr);
  let s=0; for(let i=0;i<dataArr.length;i++) s+=dataArr[i];
  vol = Math.min(100, (s/dataArr.length/128)*100);
}

let baselineVol = 0, baselineSamples = 0, baselineReady = false;
function calibrateBaseline() {
  if(baselineReady) return;
  baselineSamples++;
  baselineVol += (vol - baselineVol) * 0.3;
  if(baselineSamples > 120) { baselineReady = true; }
}

function updateGrowth(dt) {
  if(listening) calibrateBaseline();
  sVol += (vol - sVol)*0.12;
  timeElapsed += dt;
  
  const baseRate = (100 / timeLimit) * 0.65;
  const quietThreshold = mode==='quiet' ? (baselineReady ? baselineVol + 8 : 12) : 100;
  const loudThreshold = Math.max(30, (baselineReady ? baselineVol * 1.8 : 15) + 15);
  
  if(mode==='loud') {
    if(sVol > loudThreshold) {
      growth += baseRate * (1.0 + (sVol - loudThreshold)/50) * dt;
      document.getElementById('centerMsg').textContent = '\u{1F4E3} 朗读声滋养着花园！';
    } else {
      growth = Math.max(0, growth - baseRate * 0.3 * dt);
      document.getElementById('centerMsg').textContent = '\u{1F507} 没有声音，花苞暂时合拢...';
    }
  } else {
    if(sVol < quietThreshold) {
      growth += baseRate * 1.5 * dt;
      quietViolationTime = 0;
      document.getElementById('centerMsg').textContent = hints[hintIdx % hints.length];
      document.getElementById('warnIcon').classList.remove('show');
      document.getElementById('warnText').style.display = 'none';
      document.getElementById('volF').classList.remove('warning');
    } else {
      quietViolationTime += dt;
      document.getElementById('warnIcon').classList.add('show');
      document.getElementById('warnText').style.display = 'block';
      document.getElementById('volF').classList.add('warning');
      
      if(quietViolationTime >= 30) {
        growth = Math.max(0, growth - baseRate * 2.0 * dt);
        document.getElementById('centerMsg').textContent = '\u{1F342} 噪音持续太久，花朵开始枯萎了！';
      } else {
        document.getElementById('centerMsg').textContent = '\u{1F507} 有噪音，生长暂停中...';
      }
    }
  }
  
  growth = Math.min(100, Math.max(0, growth));
  
  const nl = Math.floor(growth / 10) + 1;
  if(nl !== lvl) {
    lvl = nl;
    document.getElementById('lvB').textContent = 'Lv.' + lvl;
    showEnc();
    if(_tbStudent && window.parent && window.parent !== window) {
      window.parent.postMessage({source:'toolbox2', type:'addPoints', name:_tbStudent, delta:1}, '*');
    }
  }
  
  hintTimer += dt;
  if(hintTimer > 10) { hintTimer = 0; hintIdx++; }
  
  if(timeElapsed >= timeLimit) {
    running = false; stopMic();
    document.getElementById('endLv').textContent = lvl > 0 ? 'Lv.' + lvl : 'Lv.1';
    document.getElementById('endGr').textContent = Math.round(growth) + '%';
    document.getElementById('endOverlay').style.display = 'flex';
    return;
  }
  
  updateUI();
}

function updateUI() {
  document.getElementById('volV').textContent = Math.round(sVol);
  document.getElementById('volF').style.height = sVol+'%';
  document.getElementById('grV').textContent = Math.round(growth)+'%';
  document.getElementById('grF').style.height = growth+'%';
  const timerPct = Math.max(0, 100 - (timeElapsed / timeLimit) * 100);
  document.getElementById('timerFill').style.width = timerPct + '%';
  const tf = document.getElementById('timerFill');
  if(timerPct < 20) tf.style.background = 'linear-gradient(90deg,#FF5252,#FF6B6B)';
  else if(timerPct < 50) tf.style.background = 'linear-gradient(90deg,#FFD740,#FFAB00)';
  else tf.style.background = 'linear-gradient(90deg,#60A5FA,#34D399)';
}

function showEnc() {
  const e=document.getElementById('enc');
  e.textContent=msgs[Math.floor(Math.random()*msgs.length)];
  e.classList.add('show'); setTimeout(()=>e.classList.remove('show'),2200);
}

function rand(a,b){ return a+Math.random()*(b-a); }

function initScene() {
  flowers=[]; tree={x:W/2, baseY:groundY}; bflies=[]; grass=[]; clouds=[]; particles=[];
  for(let i=0;i<120;i++) grass.push({x:rand(0,W), h:rand(15,50), w:rand(2,4), sw:Math.random()*6.28});
  for(let i=0;i<5;i++) clouds.push({x:rand(-150,W+150), y:rand(15,85), w:rand(60,130), sp:rand(0.12,0.25)});
  const fCount = 80;
  for(let i=0;i<fCount;i++) flowers.push({
    x:rand(20,W-20), stemT:rand(35,90), stem:0, bloom:0, maxB:rand(10,24),
    col:['#FF6B6B','#FF69B4','#FFD700','#FF8C00','#E040FB','#00BCD4','#76FF03','#FF4081'][Math.floor(Math.random()*8)],
    pet:5+Math.floor(Math.random()*4), sw:Math.random()*6.28, sp:rand(0.8,2.2), del:rand(0,15)
  });
  flowers.forEach((f,i)=>{ if(i<5) f.del=0; });
  if(mode==='loud') {
    for(let i=0;i<10;i++) bflies.push({x:rand(80,W-80),y:rand(H*0.15,H*0.5),sz:rand(10,18),col:['#FF6B6B','#FFD700','#E040FB','#00BCD4'][Math.floor(Math.random()*4)],vx:rand(-1,1),vy:rand(-0.4,0.4),wa:0,ws:rand(3,6),op:0});
  }
}

// ===== 绘制函数 =====
function drawSky() {
  const t = mode==='quiet' ? '#0f172a' : '#64B5F6';
  const b = mode==='quiet' ? '#1e293b' : '#E3F2FD';
  const g = X.createLinearGradient(0,0,0,H);
  g.addColorStop(0,t); g.addColorStop(0.65,b); g.addColorStop(1,'#4CAF50');
  X.fillStyle=g; X.fillRect(0,0,W,H);
}
function drawSunOrMoon() {
  const g = growth/100;
  if(mode==='loud') {
    const r=30+20*g, sx=W*0.82, sy=H*0.1;
    const gl=X.createRadialGradient(sx,sy,r, sx,sy,r*2.5+Math.sin(time*2)*3);
    gl.addColorStop(0,'rgba(255,235,59,0.5)'); gl.addColorStop(1,'rgba(255,235,59,0)');
    X.fillStyle=gl; X.beginPath(); X.arc(sx,sy,r*2.5+3,0,6.28); X.fill();
    X.fillStyle='#FFD54F'; X.beginPath(); X.arc(sx,sy,r,0,6.28); X.fill();
    X.strokeStyle='#F57F17'; X.lineWidth=2.5;
    for(let i=0;i<12;i++){const a=i/12*6.28+time*0.3,l1=r+6,l2=r+14+Math.sin(time*3+i)*5;
      X.beginPath(); X.moveTo(Math.cos(a)*l1+sx,Math.sin(a)*l1+sy); X.lineTo(Math.cos(a)*l2+sx,Math.sin(a)*l2+sy); X.stroke();}
  } else {
    const mx=W*0.82, my=H*0.12, mr=28;
    X.fillStyle='#CBD5E1'; X.beginPath(); X.arc(mx,my,mr,0,6.28); X.fill();
    X.fillStyle='#0f172a'; X.beginPath(); X.arc(mx+12,my-5,mr*0.85,0,6.28); X.fill();
    for(let i=0;i<40;i++){ const sx=(i*97.3)%W, sy=10+(i*61.7)%(H*0.3), tw=Math.sin(time*2+i)*0.5+0.5;
      X.beginPath(); X.arc(sx,sy,1+tw,0,6.28); X.fillStyle=`rgba(255,255,255,${0.3+tw*0.6})`; X.fill(); }
  }
}
function drawClouds() {
  clouds.forEach(c=>{ c.x+=c.sp; if(c.x>W+200)c.x=-150;
    X.fillStyle=mode==='quiet'?'rgba(100,116,139,0.3)':'rgba(255,255,255,0.75)';
    const h=c.w*0.35; X.beginPath(); X.arc(c.x,c.y,h*.5,0,6.28); X.arc(c.x+c.w*.2,c.y-h*.2,h*.6,0,6.28); X.arc(c.x+c.w*.4,c.y,h*.5,0,6.28); X.fill();
  });
}
function drawGround() {
  const g=X.createLinearGradient(0,groundY,0,H);
  g.addColorStop(0,'#66BB6A'); g.addColorStop(.4,'#4CAF50'); g.addColorStop(1,'#2E7D32');
  X.fillStyle=g; X.beginPath(); X.moveTo(0,groundY);
  for(let x=0;x<=W;x+=15) X.lineTo(x, groundY+Math.sin(x*.008+time*.4)*4);
  X.lineTo(W,H); X.lineTo(0,H); X.closePath(); X.fill();
  X.fillStyle='#5D4037'; X.fillRect(0,H*.94,W,H*.06);
}
function drawGrass() {
  grass.forEach(g=>{ const sw=Math.sin(time*1.5+g.sw)*6;
    X.strokeStyle='#388E3C'; X.lineWidth=g.w; X.lineCap='round';
    X.beginPath(); X.moveTo(g.x,groundY+5);
    X.quadraticCurveTo(g.x+sw*.6,groundY-g.h*.6,g.x+sw,groundY-g.h); X.stroke();
  });
}
function drawFlowers() {
  flowers.forEach(f=>{ if(f.stem<2) return;
    const sw=Math.sin(time*f.sp+f.sw)*4;
    const bx=f.x, by=groundY+3, tx=bx+sw, ty=by-f.stem;
    X.strokeStyle='#2E7D32'; X.lineWidth=2.5; X.lineCap='round';
    X.beginPath(); X.moveTo(bx,by); X.quadraticCurveTo(bx+sw*.5,by-f.stem*.5,tx,ty); X.stroke();
    if(f.stem>20){ const ly=by-f.stem*.4, lx=bx+sw*.3; X.fillStyle='#4CAF50';
      X.save(); X.translate(lx,ly); X.rotate(.4); X.beginPath(); X.ellipse(7,0,9,4,0,0,6.28); X.fill(); X.restore(); }
    if(f.bloom>1){ const sz=f.bloom;
      for(let i=0;i<f.pet;i++){const a=i/f.pet*6.28+time*.15;
        X.beginPath(); X.ellipse(tx+Math.cos(a)*sz*.45, ty+Math.sin(a)*sz*.45, sz*.42, sz*.22, a, 0, 6.28); X.fillStyle=f.col; X.fill();}
      X.beginPath(); X.arc(tx,ty,sz*.22,0,6.28); X.fillStyle='#FFF176'; X.fill();
      X.beginPath(); X.arc(tx,ty,sz*.13,0,6.28); X.fillStyle='#FF8F00'; X.fill(); }
  });
}
function drawTree() {
  if(!tree) return;
  const g=growth/100, t=tree;
  const minH=160, maxH=H*0.55, minW=16, maxW=35;
  const th=minH+(maxH-minH)*g, tw=minW+(maxW-minW)*g;
  const ty=t.baseY-th;
  const tkG=X.createLinearGradient(t.x-tw,0,t.x+tw,0);
  tkG.addColorStop(0,'#4E342E'); tkG.addColorStop(.4,'#795548'); tkG.addColorStop(1,'#3E2723');
  X.fillStyle=tkG; X.beginPath();
  X.moveTo(t.x-tw*.75,t.baseY); X.bezierCurveTo(t.x-tw*.85,t.baseY-th*.3,t.x-tw*.65,ty+30,t.x-tw*.35,ty);
  X.lineTo(t.x+tw*.35,ty); X.bezierCurveTo(t.x+tw*.65,ty+30,t.x+tw*.85,t.baseY-th*.3,t.x+tw*.75,t.baseY);
  X.closePath(); X.fill();
  if(g>.15){ const bl=Math.min(1,(g-.15)/.75); X.strokeStyle='#5D4037'; X.lineCap='round'; X.lineWidth=Math.max(3,tw*.35*bl);
    X.beginPath(); X.moveTo(t.x-tw*.2,t.baseY-th*.4); X.bezierCurveTo(t.x-tw*1.5*bl,t.baseY-th*.5,t.x-tw*2.5*bl,t.baseY-th*.6,t.x-tw*3*bl,t.baseY-th*.55); X.stroke();
    X.beginPath(); X.moveTo(t.x+tw*.15,t.baseY-th*.5); X.bezierCurveTo(t.x+tw*1.8*bl,t.baseY-th*.65,t.x+tw*2.8*bl,t.baseY-th*.7,t.x+tw*3.2*bl,t.baseY-th*.6); X.stroke(); }
  const sc=.55+.45*g, cy=ty-15;
  X.save(); X.translate(t.x+Math.sin(time*.5)*2, cy+Math.cos(time*.4)*1.5); X.scale(sc,sc);
  const cls=[{x:0,y:-10,rx:72,ry:62,c:'#4CAF50'},{x:-48,y:12,rx:66,ry:56,c:'#388E3C'},{x:52,y:8,rx:68,ry:58,c:'#43A047'},{x:-16,y:40,rx:58,ry:46,c:'#2E7D32'},{x:32,y:30,rx:56,ry:50,c:'#66BB6A'},{x:0,y:-48,rx:44,ry:34,c:'#81C784'},{x:-64,y:-6,rx:40,ry:42,c:'#388E3C'},{x:62,y:-10,rx:42,ry:46,c:'#4CAF50'}];
  cls.forEach(c=>{X.beginPath();X.ellipse(c.x,c.y,c.rx,c.ry,0,0,6.28);X.fillStyle=c.c;X.fill();});
  X.fillStyle='rgba(255,255,255,0.15)';X.beginPath();X.ellipse(-22,-36,36,30,-.2,0,6.28);X.fill();
  X.restore();
}
function drawBflies() {
  bflies.forEach(b=>{ if(b.op<.01)return; b.x+=b.vx+Math.sin(time*1.3)*.5; b.y+=b.vy+Math.cos(time*1.1)*.3;
    if(b.x<-20)b.x=W+20; if(b.x>W+20)b.x=-20; if(b.y<H*.1)b.vy+=.03; if(b.y>H*.5)b.vy-=.03; b.wa+=b.ws*.06;
    const wf=Math.sin(b.wa)*.65, s=b.sz;
    X.save(); X.translate(b.x,b.y); X.globalAlpha=b.op;
    X.fillStyle=b.col; X.save(); X.scale(1,Math.abs(wf)+.15);
    X.beginPath(); X.ellipse(-s*.45,-s*.15,s*.55,s*.38,-.25,0,6.28); X.fill();
    X.beginPath(); X.ellipse(s*.45,-s*.15,s*.55,s*.38,.25,0,6.28); X.fill();
    X.beginPath(); X.ellipse(-s*.25,s*.28,s*.35,s*.25,-.15,0,6.28); X.fill();
    X.beginPath(); X.ellipse(s*.25,s*.28,s*.35,s*.25,.15,0,6.28); X.fill();
    X.restore(); X.fillStyle='rgba(255,255,255,0.3)'; X.beginPath(); X.arc(-s*.35,-s*.12,s*.12,0,6.28); X.fill(); X.beginPath(); X.arc(s*.35,-s*.12,s*.12,0,6.28); X.fill();
    X.fillStyle='#333'; X.beginPath(); X.ellipse(0,0,s*.06,s*.32,0,0,6.28); X.fill();
    X.strokeStyle='#333'; X.lineWidth=1.2; X.beginPath(); X.moveTo(0,-s*.28); X.bezierCurveTo(-s*.25,-s*.6,-s*.32,-s*.5,-s*.35,-s*.45); X.stroke();
    X.beginPath(); X.moveTo(0,-s*.28); X.bezierCurveTo(s*.25,-s*.6,s*.32,-s*.5,s*.35,-s*.45); X.stroke();
    X.globalAlpha=1; X.restore();
  });
}
function drawParticles() {
  const th = mode==='loud' ? 18 : 0;
  if(sVol>th && Math.random()<sVol/100){
    const cols=['#FFD700','#FF6B6B','#E040FB','#76FF03','#40C4FF'];
    particles.push({x:rand(0,W),y:rand(H*.35,groundY),sz:rand(2,4),col:cols[Math.floor(Math.random()*cols.length)],life:1,vy:-1-Math.random()*1.5,vx:rand(-.6,.6)});
  }
  for(let i=particles.length-1;i>=0;i--){ const p=particles[i]; p.x+=p.vx; p.y+=p.vy; p.life-=.012;
    if(p.life<=0){particles.splice(i,1);continue;}
    X.beginPath(); X.arc(p.x,p.y,p.sz*p.life,0,6.28); X.fillStyle=p.col; X.globalAlpha=p.life; X.fill(); X.globalAlpha=1;
  }
}

function updateScene() {
  const g=growth/100;
  flowers.forEach(f=>{ if(g>f.del/100){const p=Math.min(1,(g-f.del/100)*3.5); f.stem=f.stemT*p; f.bloom=f.maxB*Math.max(0,(p-.25)/.75);} else{f.stem=0;f.bloom=0;} });
  bflies.forEach(b=> b.op = Math.min(1, g*2.5));
}

// ===== 主循环 =====
function loop(now) {
  if(!running) return;
  const dt=Math.min((now-lastT)/1000, .1); lastT=now; time+=dt;
  try {
    readVol(); updateGrowth(dt); updateScene();
    X.clearRect(0,0,W,H);
    drawSky(); drawSunOrMoon(); drawClouds(); drawGround(); drawGrass();
    drawTree(); drawFlowers(); drawBflies(); drawParticles();
  } catch(e) { console.warn("绘制异常:", e); }
  requestAnimationFrame(loop);
}
</script></script>

    <div style="font-size:44px;margin-bottom:8px;" id="endIcon">🌸</div>

    <div style="display:flex;justify-content:center;gap:20px;margin-bottom:14px;">
      <div><div style="font-size:28px;font-weight:900;" id="endLv">Lv.1</div><div style="font-size:11px;color:var(--sub);">最终等级</div></div>
      <div><div style="font-size:28px;font-weight:900;" id="endGr">0%</div><div style="font-size:11px;color:var(--sub);">生长进度</div></div>
